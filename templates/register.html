<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - InlinkAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #171920;
            color: #EFEFEF;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .card {
            background-color: #222530;
            border-radius: 10px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }

        .card-header {
            background-color: #03AA6F;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-align: center;
            padding: 1.5rem;
            border-radius: 10px 10px 0 0 !important;
        }

        .form-control {
            background-color: #2d303a;
            border: 1px solid #3a3d4a;
            color: #EFEFEF;
            padding: 12px;
        }

        .form-control:focus {
            background-color: #2d303a;
            border-color: #03AA6F;
            color: #EFEFEF;
            box-shadow: 0 0 0 0.25rem rgba(3, 170, 111, 0.25);
        }

        .btn-primary {
            background-color: #03AA6F;
            border-color: #03AA6F;
            padding: 10px 20px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-primary:hover {
            background-color: #028658;
            border-color: #028658;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo img {
            max-width: 180px;
        }

        .register-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #999;
        }

        .register-footer a {
            color: #03AA6F;
            text-decoration: none;
        }

        .alert {
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="brand-logo">
                    <img src="https://raw.githubusercontent.com/Amh-42/assets/refs/heads/main/inlinkai-main-logo.png"
                        alt="InlinkAI Logo">
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <div class="card">
                    <div class="card-header">
                        Create Your Account
                    </div>
                    <div class="card-body p-4">
                        <form method="post" action="{{ url_for('register') }}">
                            <div class="mb-3">
                                <label for="full_name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="full_name" name="full_name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirm_password"
                                    name="confirm_password" required>
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Register</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="register-footer">
                    Already have an account? <a href="{{ url_for('login') }}">Login here</a><br>
                    <a href="{{ url_for('index') }}">Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
